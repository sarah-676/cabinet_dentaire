version: "3.9"

networks:
  cabinet_network:
    driver: bridge
  db_network:
    driver: bridge
  mq_network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  consul_data:
  static_files:
  media_files:

services:

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - cabinet_network
    labels:
      - "traefik.enable=true"

  consul:
    image: hashicorp/consul:1.18
    container_name: consul
    restart: unless-stopped
    ports:
      - "8500:8500"
    volumes:
      - ./docker/consul/consul.json:/consul/config/consul.json:ro
      - consul_data:/consul/data
    command: "agent -config-dir=/consul/config"
    networks:
      - cabinet_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.consul.rule=Host(`consul.localhost`)"
      - "traefik.http.services.consul.loadbalancer.server.port=8500"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - cabinet_network
      - db_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    env_file: .env
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - cabinet_network
      - mq_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  auth_service:
    build:
      context: ./cabinet_dentaire_backend/auth_service
      dockerfile: Dockerfile
    container_name: auth_service
    restart: unless-stopped
    env_file: .env
    environment:
      - AUTH_POSTGRES_DB=auth_db
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_started
    networks:
      - cabinet_network
      - db_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
      - "traefik.http.services.auth.loadbalancer.server.port=8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3

  api_service:
    build:
      context: ./cabinet_dentaire_backend/api_service
      dockerfile: Dockerfile
    container_name: api_service
    restart: unless-stopped
    env_file: .env
    environment:
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth_service:
        condition: service_healthy
    networks:
      - cabinet_network
      - db_network
      - mq_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.http.routers.ws.rule=PathPrefix(`/ws`)"
      - "traefik.http.routers.ws.service=api"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    build:
      context: ./cabinet_dentaire_backend/api_service
      dockerfile: Dockerfile
    container_name: celery_worker
    restart: unless-stopped
    env_file: .env
    command: celery -A config worker --loglevel=info --concurrency=4
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - cabinet_network
      - db_network
      - mq_network

  celery_beat:
    build:
      context: ./cabinet_dentaire_backend/api_service
      dockerfile: Dockerfile
    container_name: celery_beat
    restart: unless-stopped
    env_file: .env
    command: celery -A config beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cabinet_network
      - db_network
      - mq_network

  frontend:
    build:
      context: ./cabinet_dentaire_frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - api_service
    networks:
      - cabinet_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
